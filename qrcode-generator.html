<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>QR Code – rustemaj-bau.com</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  body{font-family:system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#F5F1EA;gap:1.5rem}
  h1{font-size:1.25rem;color:#1A1A1A;margin:0}
  #qr{background:#fff;padding:24px;border-radius:4px;box-shadow:0 2px 20px rgba(0,0,0,.1)}
  button{background:#A8331C;color:#fff;border:none;padding:.875rem 2rem;font-size:1rem;font-weight:600;border-radius:2px;cursor:pointer}
  button:hover{background:#7A2614}
  p{font-size:.875rem;color:#7A7570;margin:0}
</style>
</head>
<body>
<h1>QR Code – rustemaj-bau.com</h1>
<div id="qr"></div>
<p>https://rustemaj-bau.com/</p>
<button onclick="download()">PNG herunterladen</button>

<script>
const qr = new QRCode(document.getElementById('qr'), {
  text: 'https://rustemaj-bau.com/',
  width: 300,
  height: 300,
  colorDark: '#1A1A1A',
  colorLight: '#ffffff',
  correctLevel: QRCode.CorrectLevel.H
});

function download() {
  const canvas = document.querySelector('#qr canvas');
  const link = document.createElement('a');
  link.download = 'rustemaj-qrcode.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
